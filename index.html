<!DOCTYPE html>
<html lang="pt-BR">

<head>

<title>Login</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>🚂 Ferrorama</h1>
    </div>

    <p class="subtitle">

    </p>

    <div id="mensagem" class="message"></div>

    <div class="links">
        <p>
            <a href="pages/recuperar-senha.html">

            </a>
        </p>

        <br>

            Não possui conta?

            <a href="pages/cadastro.html">
                Cadastre-se
            </a>
        </p>
    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
